name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-macos:
    name: Test (macOS)
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable
      - name: Show toolchain
        run: |
          xcodebuild -version
          swift --version
      - name: Run tests
        run: swift test --disable-experimental-prebuilts
